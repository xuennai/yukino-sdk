name: Build and Release AAR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'murine'
          cache: 'gradle'

      - name: Build AAR
        run: |
          chmod +x gradlew
          # 只保留核心编译任务
          ./gradlew :yukino-sdk:assembleRelease

      - name: Rename AAR for Release
        run: |
          ORIGINAL_AAR="yukino-sdk/build/outputs/aar/yukino-sdk-release.aar"
          NEW_AAR_NAME="yukino-sdk-${{ github.ref_name }}.aar"
          cp "$ORIGINAL_AAR" "./$NEW_AAR_NAME"
          echo "RELEASE_AAR_PATH=./$NEW_AAR_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.RELEASE_AAR_PATH }}
          name: Yukino SDK ${{ github.ref_name }}
          body: |
            ## 🚀 Yukino SDK Release
            
            **本次更新包含：**
            - 🔄 核心库已统一为 `yukino-sdk`
            - 📚 集成 `libmobi` 解析引擎 (Submodule)
            - ⚡ 移除 PDFium 依赖，切换至原生高性能 `PdfRenderer` (0MB 增量方案)
            
            **Maven 坐标:**
            `com.github.xuennai:yukino-sdk:${{ github.ref_name }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
