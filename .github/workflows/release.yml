name: Build and Release AAR

# 触发条件
on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，如 v1.0.0
  workflow_dispatch: # 支持在 GitHub 页面上手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    # 赋予 Action 写入 Release 的权限
    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 JDK 21 (与你的 build.gradle 匹配)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 5. 运行你的 Python 脚本
      # 它会自动下载最新的 PDFium 二进制文件
      - name: Update PDFium and Build
        run: |
          chmod +x gradlew
          python update_pdfium.py

      # 6. 自动创建 GitHub Release 并上传 AAR
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: pdfium-sdk/build/outputs/aar/pdfium-sdk-release.aar
          name: Release ${{ github.ref_name }}
          body: |
            Automatic build of Yukino PDF SDK.
            Target Architecture: arm64-v8a
            Source PDFium: Latest from bblanchon/pdfium-binaries
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
